<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Login Page</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <!-- Include navbar fragment -->
  <div th:replace="fragments/navbar :: navbar"></div>
  
  <div class="col-md-6 offset-3  mt-4">
	<!--This line cause in error in future-->
      <form th:action="@{/save}" method="post" th:object="${myuser}">
        <div class="mb-3">
          <label for="exampleInputEmail1" class="form-label">FirstName : </label>
          <input type="text"  th:field="*{fname}" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
        </div>
		
		<div class="mb-3">
		          <label for="exampleInputEmail1" class="form-label">lastName : </label>
		          <input type="text"  th:field="*{lname}" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
		        </div>
		 
		 <div class="mb-3">
		           <label for="exampleInputEmail1" class="form-label">Email : </label>
		           <input type="text" th:field="*{email}" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
		          
		  </div>
		  
		 
        <div class="mb-3">
          <label for="exampleInputPassword1" class="form-label">Password</label>
          <input type="password" th:field="*{password}" class="form-control" id="exampleInputPassword1">
        </div>

        <!-- CSRF token -->
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <button type="submit" class="btn btn-primary">Submit</button>
		
		<div class="alert alert-danger" role="alert" th:if=${param.error}>
	!!!!!!!!!!!!!!!!!!!!!!
		 </div>
      </form>
	  
	  <div class="alert alert-success mt-3" role="alert" 	  th:if="${success}" 
	       th:text="${success}">

	  </div>
    </div>
	
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	</body>
	</html>
